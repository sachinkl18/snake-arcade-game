<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Arcade Pro</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#0f172a">
</head>

<script src="engine.js"></script>
<script src="game.js"></script>

<!-- Loading Screen -->
<div id="loadingScreen" class="screen">
    <h1>🐍 Snake Arcade Pro</h1>
    <div class="loader"></div>
    <p>Loading...</p>
</div>

<!-- Main Menu -->
<div id="menuScreen" class="screen hidden">

    <h1>🐍 Snake Arcade Pro</h1>

    <button id="playBtn">▶ Play</button>

    <button id="leaderboardBtn">🏆 Leaderboard</button>

    <button id="settingsBtn">⚙ Settings</button>

    <button id="aboutBtn">ℹ About</button>

</div>

<!-- Game Screen -->
<div id="gameScreen" class="hidden">

    <header>

        <div class="scoreBox">

            <span>Score</span>

            <h2 id="score">0</h2>

        </div>

        <div class="scoreBox">

            <span>High Score</span>

            <h2 id="highScore">0</h2>

        </div>

        <div class="scoreBox">

            <span>Level</span>

            <h2 id="level">1</h2>

        </div>

    </header>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <div class="controls">

        <button id="pauseBtn">Pause</button>

        <button id="resumeBtn">Resume</button>

        <button id="restartBtn">Restart</button>

    </div>

</div>

<!-- Leaderboard -->
<div id="leaderboardScreen" class="screen hidden">

    <h1>🏆 Top Scores</h1>

    <ol id="leaderboardList"></ol>

    <button class="backBtn">⬅ Back</button>

</div>

<!-- Settings -->
<div id="settingsScreen" class="screen hidden">

    <h1>⚙ Settings</h1>

    <label>

        <input type="checkbox" id="soundToggle" checked>

        Sound ON

    </label>

    <br><br>

    <label>

        <input type="checkbox" id="musicToggle" checked>

        Music ON

    </label>

    <br><br>

    <button class="backBtn">⬅ Back</button>

</div>

<!-- About -->
<div id="aboutScreen" class="screen hidden">

    <h1>About</h1>

    <p>

        Snake Arcade Pro Ultimate Edition

    </p>

    <p>

        Built with HTML5 Canvas

    </p>

    <button class="backBtn">⬅ Back</button>

</div>

<script src="game.js"></script>

    <script src="engine.js"></script>
<script src="controls.js"></script>
<script src="game.js"></script>
</body>
</html>
