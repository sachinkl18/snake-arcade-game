<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snake Arcade Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111827">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#38bdf8">

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>

<div class="container">

    <h1>🐍 Snake Arcade Pro</h1>

    <div class="top-panel">

        <div class="card">
            Score
            <span id="score">0</span>
        </div>

        <div class="card">
            High Score
            <span id="highScore">0</span>
        </div>

        <div class="card">
            Level
            <span id="level">1</span>
        </div>

    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="buttons">

        <button onclick="startGame()">▶ Start</button>

        <button onclick="pauseGame()">⏸ Pause</button>

        <button onclick="resumeGame()">▶ Resume</button>

        <button onclick="resetGame()">🔄 Restart</button>

    </div>

    <div class="leaderboard">

        <h2>🏆 Top Scores</h2>

        <ol id="leaderboardList"></ol>

    </div>

</div>

<div class="mobile-controls">

    <button onclick="moveUp()">⬆</button>

    <div>

        <button onclick="moveLeft()">⬅</button>

        <button onclick="moveRight()">➡</button>

    </div>

    <button onclick="moveDown()">⬇</button>

</div>

<audio id="eatSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<audio id="gameOverSound" src="https://assets.mixkit.co/active_storage/sfx/2220/2220-preview.mp3"></audio>

<audio id="levelSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<script src="game.js"></script>

</body>
</html>
<div class="leaderboard">
    <h2>🏆 Top 10 Scores</h2>
    <ol id="leaderboardList"></ol>
</div>
